<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Do Good Landing Page Builder</title>
  <link rel="stylesheet" href="admin-login.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <div class="login-header">
        <p class="eyebrow">Do Good Admin</p>
        <h1>Admin Login</h1>
        <p>Sign in to review submissions, update statuses, and publish landing pages.</p>
      </div>

      <form id="adminLoginForm" class="login-form">
        <div class="form-group">
          <label for="adminEmail">Email</label>
          <input
            type="email"
            id="adminEmail"
            placeholder="admin@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input
            type="password"
            id="adminPassword"
            placeholder="Enter password"
            required
          />
        </div>

        <button type="submit" id="adminLoginBtn">Login</button>

        <p id="loginMessage" class="login-message"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="admin-login.js"></script>
</body>
</html>
