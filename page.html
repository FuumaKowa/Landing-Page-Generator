<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Published Do Good Landing Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="landingPage"></main>

  <script>
    window.DO_GOOD_PUBLIC_VIEWER = true;
  </script>

  <script src="script.js"></script>

  <script>
    function getPublishedPageBySlug(slug) {
      const savedPages = localStorage.getItem("dogoodPublishedLandingPages");

      if (!savedPages) return null;

      try {
        const pages = JSON.parse(savedPages);
        return Array.isArray(pages)
          ? pages.find((page) => page.slug === slug)
          : null;
      } catch (error) {
        console.error("Invalid published pages data.", error);
        return null;
      }
    }

    function getSlugFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug");
    }

    function renderNotFound(message) {
      const landingPage = document.getElementById("landingPage");

      landingPage.innerHTML = `
        <section>
          <div class="container">
            <h1>Published page not found</h1>
            <p>${message}</p>
          </div>
        </section>
      `;
    }

    window.addEventListener("DOMContentLoaded", () => {
      const slug = getSlugFromUrl();

      if (!slug) {
        renderNotFound("No slug was provided.");
        return;
      }

      const publishedPage = getPublishedPageBySlug(slug);

      if (!publishedPage) {
        renderNotFound("No published landing page exists for this slug.");
        return;
      }

      currentAgentData = normalizeAgentData(publishedPage.agentData);
      renderLandingPage(currentAgentData);
    });
  </script>
</body>
</html>
