<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do Good Landing Page Preview</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="landingPage"></main>

  <script>
    window.DO_GOOD_PUBLIC_VIEWER = true;
  </script>

  <script src="storage.js"></script>
  <script src="script.js"></script>

  <script>
    function getPublishedPageBySlug(slug) {
  const pages = DoGoodStorage.getPublishedPages();
  return pages.find((page) => page.slug === slug) || null;
}

function getSubmissionById(id) {
  const submissions = DoGoodStorage.getSubmissions();
  return submissions.find((submission) => submission.id === id) || null;
}

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function renderNotFound(message) {
      const landingPage = document.getElementById("landingPage");

      landingPage.innerHTML = `
        <section>
          <div class="container">
            <h1>Landing page preview not found</h1>
            <p>${message}</p>
          </div>
        </section>
      `;
    }

    window.addEventListener("DOMContentLoaded", () => {
      const slug = getUrlParam("slug");
      const submissionId = getUrlParam("submission");

      if (slug) {
        const publishedPage = getPublishedPageBySlug(slug);

        if (!publishedPage) {
          renderNotFound("No published landing page exists for this slug.");
          return;
        }

        currentAgentData = normalizeAgentData(publishedPage.agentData);
        renderLandingPage(currentAgentData);
        return;
      }

      if (submissionId) {
        const submission = getSubmissionById(submissionId);

        if (!submission) {
          renderNotFound("No submitted landing page request exists for this ID.");
          return;
        }

        currentAgentData = normalizeAgentData(submission.agentData);
        renderLandingPage(currentAgentData);
        return;
      }

      renderNotFound("No slug or submission ID was provided.");
    });
  </script>
</body>
</html>
