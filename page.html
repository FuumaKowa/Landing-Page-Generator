<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Published Do Good Landing Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="landingPage"></main>

  <script src="script.js"></script>
  <script>
    function getPublishedPageBySlug(slug) {
      const savedPages = localStorage.getItem("dogoodPublishedLandingPages");

      if (!savedPages) return null;

      try {
        const pages = JSON.parse(savedPages);
        return Array.isArray(pages)
          ? pages.find((page) => page.slug === slug)
          : null;
      } catch (error) {
        console.error("Invalid published pages data.", error);
        return null;
      }
    }

    function getSlugFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug");
    }

    window.addEventListener("load", () => {
      const slug = getSlugFromUrl();

      if (!slug) {
        document.getElementById("landingPage").innerHTML = `
          <section>
            <div class="container">
              <h1>Published page not found</h1>
              <p>No slug was provided.</p>
            </div>
          </section>
        `;
        return;
      }

      const publishedPage = getPublishedPageBySlug(slug);

      if (!publishedPage) {
        document.getElementById("landingPage").innerHTML = `
          <section>
            <div class="container">
              <h1>Published page not found</h1>
              <p>No published landing page exists for this slug.</p>
            </div>
          </section>
        `;
        return;
      }

      currentAgentData = normalizeAgentData(publishedPage.agentData);
      renderLandingPage(currentAgentData);
    });
  </script>
</body>
</html>
