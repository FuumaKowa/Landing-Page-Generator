<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do Good Landing Page Preview</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="landingPage"></main>

  <script>
    window.DO_GOOD_PUBLIC_VIEWER = true;
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="storage.js"></script>
  <script src="script.js"></script>

  <script>

async function getPublishedPageBySlug(slug) {
  if (typeof window.supabaseClient !== "undefined" && isSupabaseConfigured()) {
    const { data, error } = await window.supabaseClient
      .from("published_landing_pages")
      .select("*")
      .eq("slug", slug)
      .maybeSingle();

    if (error) {
      console.warn("Supabase published page read failed. Falling back to localStorage.", error);
    }

    if (data) {
      return {
        id: data.id,
        submissionId: data.submission_id,
        agentId: data.agent_id,
        slug: data.slug,
        publicPath: data.public_path,
        status: data.status,
        publishedAt: data.published_at,
        agentData: data.page_data || {}
      };
    }
  }

  const pages = DoGoodStorage.getPublishedPages();
  return pages.find((page) => page.slug === slug) || null;
}

    async function getSubmissionById(id) {
      if (typeof window.supabaseClient !== "undefined" && isSupabaseConfigured()) {
        const { data, error } = await window.supabaseClient
          .from("landing_page_submissions")
          .select("*")
          .eq("id", id)
          .maybeSingle();

        if (error) {
          console.warn("Supabase submission preview read failed. Falling back to localStorage.", error);
        }

        if (data) {
          return {
            id: data.id,
            supabaseId: data.id,
            status: data.status,
            paymentStatus: data.payment_status,
            approvalStatus: data.approval_status,
            revisionMessage: data.revision_message || "",
            adminNote: data.admin_note || "",
            submittedAt: data.submitted_at,
            resubmittedAt: data.resubmitted_at,
            reviewedAt: data.reviewed_at,
            updatedAt: data.updated_at,
            agentData: data.page_data || {}
          };
        }
      }

      const submissions = DoGoodStorage.getSubmissions();

      return submissions.find((submission) => {
        return submission.id === id || submission.supabaseId === id;
      }) || null;
    }

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function getSlugFromPath() {
      const pathParts = window.location.pathname
        .split("/")
        .map((part) => part.trim())
        .filter(Boolean);
    
      const agentRouteIndex = pathParts.indexOf("a");
    
      if (agentRouteIndex === -1) {
        return null;
      }
    
      return pathParts[agentRouteIndex + 1] || null;
    }

    function renderNotFound(message) {
      const landingPage = document.getElementById("landingPage");

      landingPage.innerHTML = `
        <section>
          <div class="container">
            <h1>Landing page preview not found</h1>
            <p>${message}</p>
          </div>
        </section>
      `;
    }

    window.addEventListener("DOMContentLoaded", async () => {
      const slug = getUrlParam("slug") || getSlugFromPath();
      const submissionId = getUrlParam("submission");

      if (slug) {
        const publishedPage = await getPublishedPageBySlug(slug);

        if (!publishedPage) {
  renderNotFound("No landing page exists for this slug.");
  return;
}

if (publishedPage.status !== "published") {
  renderNotFound("This landing page is currently unpublished.");
  return;
}

currentAgentData = normalizeAgentData(publishedPage.agentData);
renderLandingPage(currentAgentData);
return;
      }

      if (submissionId) {
        const submission = await getSubmissionById(submissionId);

        if (!submission) {
          renderNotFound("No submitted landing page request exists for this ID.");
          return;
        }

        currentAgentData = normalizeAgentData(submission.agentData);
        renderLandingPage(currentAgentData);
        return;
      }

      renderNotFound("No slug or submission ID was provided.");
    });
  </script>
</body>
</html>
