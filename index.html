<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do Good Agent Landing Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="preview-panel">
    <strong>Preview Controls</strong>

    <label>
      Theme
      <select id="themeSelect">
        <option value="clean-bright">Clean Bright</option>
        <option value="premium-dark">Premium Dark</option>
        <option value="natural-cream">Natural Cream</option>
        <option value="soft-pink">Soft Pink</option>
      </select>
    </label>

    <label>
      Target Audience
      <select id="audienceSelect">
        <option value="Working adults">Working adults</option>
        <option value="Parents / family care">Parents / family care</option>
        <option value="Busy lifestyle users">Busy lifestyle users</option>
        <option value="First-time wellness users">First-time wellness users</option>
        <option value="General audience">General audience</option>
      </select>
    </label>

    <label>
      Structure
      <select id="structureSelect">
        <option value="standard">Standard Page</option>
        <option value="simple">Simple Page</option>
        <option value="sales-focus">Sales Focus Page</option>
        <option value="trust-focus">Trust Focus Page</option>
      </select>
    </label>

    <label>
      Hero Style
      <select id="heroStyleSelect">
        <option value="product-focus">Product Focus</option>
        <option value="agent-focus">Agent Focus</option>
        <option value="problem-focus">Problem Focus</option>
      </select>
    </label>

    <label>
      Language
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="zh">Chinese</option>
      </select>
    </label>

    <div class="section-controls">
  <span>Sections</span>

  <label>
    <input type="checkbox" value="pain-point" checked>
    Pain Point
  </label>

  <label>
    <input type="checkbox" value="product" checked>
    Product
  </label>

  <label>
    <input type="checkbox" value="benefits" checked>
    Benefits
  </label>

  <label>
    <input type="checkbox" value="package" checked>
    Package
  </label>

  <label>
    <input type="checkbox" value="agent" checked>
    Agent
  </label>

  <label>
    <input type="checkbox" value="faq" checked>
    FAQ
  </label>
</div>

<div class="content-controls">
  <label>
    Agent Name
    <input type="text" id="agentNameInput" placeholder="Agent name">
  </label>

  <label>
    WhatsApp
    <input type="text" id="whatsappInput" placeholder="60123456789">
  </label>

  <label>
    Product Name
    <input type="text" id="productNameInput" placeholder="Product name">
  </label>

  <label>
    Package Name
    <input type="text" id="packageNameInput" placeholder="Package name">
  </label>

  <label>
    Package Price
    <input type="text" id="packagePriceInput" placeholder="RM188">
  </label>

  <label class="wide-control">
  Short Message
  <input type="text" id="shortMessageInput" placeholder="Short landing page message">
</label>

<label class="wide-control">
  Custom Hero Title
  <input type="text" id="heroTitleInput" placeholder="Leave empty to use preset headline">
</label>

<label class="wide-control">
  Custom Hero Subtitle
  <input type="text" id="heroSubtitleInput" placeholder="Leave empty to use preset subtitle">
</label>

<label class="wide-control">
  Package Details
  <textarea id="packageDetailsInput" placeholder="Describe what is included in this package"></textarea>
</label>

<label class="wide-control">
  Product Image URL
  <input type="text" id="productImageInput" placeholder="Paste product image URL">
</label>

<label class="wide-control">
  Agent Photo URL
  <input type="text" id="agentPhotoInput" placeholder="Paste agent photo URL">
</label>

<label class="wide-control">
  Custom WhatsApp Message
  <textarea id="whatsappMessageInput" placeholder="Leave empty to use default WhatsApp message"></textarea>
</label>
</div>

<div class="export-controls">
  <label class="import-json-label">
  Import Agent JSON
  <input type="file" id="importJsonInput" accept="application/json">
</label>

<div id="validationStatus" class="validation-status"></div>

<button id="exportJsonBtn" type="button">Export Agent JSON</button>
<button id="exportHtmlBtn" type="button">Export Landing Page HTML</button>
<button id="clearDraftBtn" type="button">Clear Draft</button>
</div>

  <main id="landingPage"></main>

  <script src="script.js"></script>
</body>
</html>
